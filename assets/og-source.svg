<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Open Graph image — 1200×630 — used for Discord/Twitter/Slack previews -->
  <defs>
    <linearGradient id="og_sg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b59cf0"/>
      <stop offset="100%" stop-color="#5b3da8"/>
    </linearGradient>
    <linearGradient id="og_sg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a55cc"/>
      <stop offset="100%" stop-color="#3d2872"/>
    </linearGradient>
    <linearGradient id="og_word" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#b59cf0"/>
      <stop offset="100%" stop-color="#6e54a8"/>
    </linearGradient>
    <radialGradient id="og_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9673e6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9673e6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="og_grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" stroke="rgba(255,255,255,0.025)" stroke-width="1" fill="none"/>
    </pattern>
  </defs>

  <!-- Dark base -->
  <rect width="1200" height="630" fill="#0a0a0d"/>

  <!-- Subtle grid -->
  <rect width="1200" height="630" fill="url(#og_grid)"/>

  <!-- Violet halo top center -->
  <ellipse cx="600" cy="200" rx="700" ry="350" fill="url(#og_glow)"/>

  <!-- Sigma mark (centered, scaled) -->
  <g transform="translate(220 195) scale(1.2)">
    <path d="M100 36 L168 164 L32 164 Z" fill="url(#og_sg1)"/>
    <path d="M100 36 L168 164 L142 164 L100 92 Z" fill="url(#og_sg2)" opacity="0.85"/>
    <path d="M88 164 L100 138 L112 164 Z" fill="#0a0a0d"/>
    <circle cx="100" cy="40" r="5.5" fill="#e8defb"/>
  </g>

  <!-- Wordmark AETHER -->
  <text x="500" y="338" font-family="Inter, -apple-system, sans-serif"
        font-size="180" font-weight="900" letter-spacing="32"
        fill="url(#og_word)">AETHER</text>

  <!-- Tagline -->
  <text x="500" y="408" font-family="Inter, -apple-system, sans-serif"
        font-size="34" font-weight="400" letter-spacing="2"
        fill="#b9b3ca">read-only CS2 overlay</text>
  <text x="500" y="448" font-family="Inter, -apple-system, sans-serif"
        font-size="34" font-weight="400" letter-spacing="2"
        fill="#7d7891">pure mouse driven · zero memory writes</text>

  <!-- Bottom accent line -->
  <rect x="500" y="496" width="80" height="3" fill="#9673e6" rx="1.5"/>

  <!-- URL bottom right -->
  <text x="1140" y="585" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="22" font-weight="500" letter-spacing="2"
        fill="#7d7891" text-anchor="end">aetherr.site</text>

  <!-- Status pill bottom left -->
  <g transform="translate(60 555)">
    <rect width="240" height="40" rx="20" fill="rgba(255,255,255,0.04)"
          stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="20" cy="20" r="5" fill="#5ac8dc"/>
    <text x="36" y="27" font-family="JetBrains Mono, monospace"
          font-size="14" font-weight="500" letter-spacing="2"
          fill="#b9b3ca">v1.0-beta · cs2 build 2026</text>
  </g>
</svg>
