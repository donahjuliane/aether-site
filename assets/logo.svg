<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Variant D: SIGMA — sharp triangle with diagonal slice (brutalist tech) -->
  <defs>
    <linearGradient id="sigmaG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b59cf0"/>
      <stop offset="100%" stop-color="#5b3da8"/>
    </linearGradient>
    <linearGradient id="sigmaG2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a55cc"/>
      <stop offset="100%" stop-color="#3d2872"/>
    </linearGradient>
    <radialGradient id="sigmaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9673e6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9673e6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft halo -->
  <circle cx="100" cy="100" r="95" fill="url(#sigmaGlow)"/>

  <!-- Main triangle (upward) -->
  <path d="M100 28 L172 168 L28 168 Z" fill="url(#sigmaG)"/>

  <!-- Diagonal slice cut — darker triangle on top revealing depth -->
  <path d="M100 28 L172 168 L142 168 L100 88 Z" fill="url(#sigmaG2)" opacity="0.85"/>

  <!-- Inner dark notch (bottom center) -->
  <path d="M86 168 L100 138 L114 168 Z" fill="#0a0a0d"/>

  <!-- Pulse dot at apex -->
  <circle cx="100" cy="32" r="4.5" fill="#e8defb"/>
</svg>
